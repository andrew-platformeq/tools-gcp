name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit

      - name: Unit tests
        run: pytest -q
        env:
          TOOLS_GCP_PROJECT: ci-placeholder
          TOOLS_SKIP_GCP: "1"
